<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kayapalat</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 20px;
background:white;
position:sticky;
top:0;
z-index:100;
}

.logo{
font-family:Playfair Display;
font-size:22px;
letter-spacing:5px;
}

.menu-icon,.cart-icon{
font-size:22px;
cursor:pointer;
}

.mobileMenu{
position:fixed;
top:0;
left:-100%;
width:100%;
height:100%;
background:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:35px;
font-size:22px;
letter-spacing:3px;
transition:.4s;
z-index:1000;
}

.mobileMenu.active{
left:0;
}

.hero{
height:90vh;
background:url("https://images.unsplash.com/photo-1600607686527-6fb886090705?w=2000") center/cover;
position:relative;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
color:white;
}

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
}

.hero h1{
position:relative;
font-size:55px;
letter-spacing:8px;
font-family:Playfair Display;
margin:0;
}

.hero p{
position:relative;
margin-top:10px;
font-size:18px;
opacity:.9;
}

.luxury-btn{
position:relative;
margin-top:20px;
padding:14px 40px;
border:1px solid #C6A75E;
background:transparent;
color:white;
letter-spacing:3px;
font-size:13px;
cursor:pointer;
transition:.3s;
}

.luxury-btn:hover{
background:#C6A75E;
color:black;
}

.page{
display:none;
padding:40px 20px;
}

.page.active{
display:block;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

.product{
border:1px solid #eee;
padding:10px;
text-align:center;
}

.product img{
width:100%;
}

button{
cursor:pointer;
padding:8px 15px;
margin-top:10px;
}

.cart{
position:fixed;
right:-350px;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-3px 0 10px rgba(0,0,0,.1);
padding:20px;
transition:.4s;
z-index:999;
}

.cart.active{
right:0;
}

</style>
</head>

<body>

<header>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="logo">KAYAPALAT</div>

<div class="cart-icon" onclick="toggleCart()">🛒 (<span id="cartCount">0</span>)</div>

</header>

<div class="mobileMenu" id="mobileMenu">

<div onclick="openPage('home')">HOME</div>
<div onclick="openPage('fashion')">FASHION</div>
<div onclick="openPage('decor')">DECOR</div>
<div onclick="toggleCart()">CART</div>

</div>


<!-- HOME -->

<div id="home" class="page active">

<div class="hero">

<h1>KAYAPALAT</h1>
<p>Makeover Allover</p>

<button class="luxury-btn" onclick="openPage('fashion')">
SHOP FASHION
</button>

</div>

</div>


<!-- FASHION -->

<div id="fashion" class="page">

<h2>Fashion Collection</h2>

<div class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<p>Classic Shirt</p>
<button onclick="addToCart('Classic Shirt')">Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
<p>Luxury Jacket</p>
<button onclick="addToCart('Luxury Jacket')">Add to Cart</button>
</div>

</div>

</div>


<!-- DECOR -->

<div id="decor" class="page">

<h2>Decor Collection</h2>

<div class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85">
<p>Modern Lamp</p>
<button onclick="addToCart('Modern Lamp')">Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1493666438817-866a91353ca9">
<p>Wood Chair</p>
<button onclick="addToCart('Wood Chair')">Add to Cart</button>
</div>

</div>

</div>


<!-- CART -->

<div class="cart" id="cart">

<h2>Cart</h2>

<ul id="cartItems"></ul>

</div>



<script>

let cart=[]
let cartCount=document.getElementById("cartCount")
let cartItems=document.getElementById("cartItems")

function addToCart(item){

cart.push(item)

cartCount.innerText=cart.length

let li=document.createElement("li")
li.innerText=item

cartItems.appendChild(li)

}

function toggleCart(){

cart.classList.toggle("active")

mobileMenu.classList.remove("active")

}

function toggleMenu(){

mobileMenu.classList.toggle("active")

}

function openPage(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(page).classList.add("active")

mobileMenu.classList.remove("active")

cart.classList.remove("active")

window.scrollTo(0,0)

}

</script>

</body>
</html>
