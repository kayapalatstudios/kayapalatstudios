<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>KAYAPALAT</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:#F8F6F2;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 6%;
background:white;
border-bottom:1px solid #eee;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-family:Playfair Display;
font-size:26px;
letter-spacing:4px;
}

nav a{
margin:0 14px;
cursor:pointer;
font-size:14px;
text-transform:uppercase;
}

nav a:hover{
color:#C6A75E;
}

.hero{
height:85vh;
background:url("https://images.unsplash.com/photo-1600607686527-6fb886090705?w=2000") center/cover;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.hero h1{
font-size:60px;
letter-spacing:6px;
font-family:Playfair Display;
margin:0;
}

.hero p{
font-size:18px;
}

.btn{
padding:12px 30px;
border:1px solid white;
background:none;
color:white;
cursor:pointer;
letter-spacing:2px;
}

.page{
display:none;
padding:60px 6%;
max-width:1300px;
margin:auto;
}

.page.active{
display:block;
animation:fade .4s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

.page-title{
font-family:Playfair Display;
font-size:34px;
margin-bottom:25px;
}

.search input{
width:100%;
padding:12px;
border:1px solid #ddd;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
box-shadow:0 10px 25px rgba(0,0,0,.08);
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:280px;
object-fit:cover;
transition:.4s;
}

.card:hover img{
transform:scale(1.05);
}

.card-content{
padding:15px;
}

.price{
color:#C6A75E;
}

.cart{
position:fixed;
top:0;
right:-340px;
width:320px;
height:100%;
background:white;
box-shadow:-10px 0 20px rgba(0,0,0,.15);
padding:20px;
transition:.3s;
z-index:1001;
overflow:auto;
}

.cart.active{
right:0;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.3);
opacity:0;
pointer-events:none;
transition:.3s;
z-index:1000;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

.cart-item{
border-bottom:1px solid #eee;
padding:10px 0;
}

</style>

</head>

<body>

<header>

<div class="logo">KAYAPALAT</div>

<nav>

<a onclick="openPage('home')">Home</a>
<a onclick="openPage('fashion')">Fashion</a>
<a onclick="openPage('decor')">Decor</a>
<a onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</a>

</nav>

</header>


<div class="overlay" id="overlay" onclick="closeCart()"></div>


<div id="home" class="page active">

<section class="hero">

<h1>KAYAPALAT</h1>
<p>Makeover Allover</p>

<button class="btn" onclick="openPage('fashion')">Shop Fashion</button>

</section>

</div>


<div id="fashion" class="page">

<h2 class="page-title">Fashion</h2>

<div class="search">
<input type="text" placeholder="Search fashion..." onkeyup="searchProducts(this.value,'fashion')">
</div>

<div class="grid" id="fashionGrid"></div>

</div>


<div id="decor" class="page">

<h2 class="page-title">Decor</h2>

<div class="search">
<input type="text" placeholder="Search decor..." onkeyup="searchProducts(this.value,'decor')">
</div>

<div class="grid" id="decorGrid"></div>

</div>


<div class="cart" id="cartBox">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3 id="cartTotal"></h3>

</div>


<script>

function openPage(page){

closeCart()

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(page).classList.add("active")

window.scrollTo(0,0)

}


const fashionProducts=[

{name:"Classic Dress",price:12000,img:"https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=800"},

{name:"Silk Kurta",price:9500,img:"https://images.unsplash.com/photo-1520975922323-7b73b6b0b5d5?w=800"}

]

const decorProducts=[

{name:"Minimal Vase",price:8400,img:"https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?w=800"},

{name:"Stone Sculpture",price:14000,img:"https://images.unsplash.com/photo-1616627451515-cbc80e5ece35?w=800"}

]


function loadProducts(){

fashionProducts.forEach(p=>{

fashionGrid.innerHTML+=`

<div class="card">

<img src="${p.img}">

<div class="card-content">

<h3>${p.name}</h3>

<p class="price">₹${p.price}</p>

<button onclick='addToCart("${p.name}",${p.price})'>Add</button>

</div>

</div>`

})

decorProducts.forEach(p=>{

decorGrid.innerHTML+=`

<div class="card">

<img src="${p.img}">

<div class="card-content">

<h3>${p.name}</h3>

<p class="price">₹${p.price}</p>

<button onclick='addToCart("${p.name}",${p.price})'>Add</button>

</div>

</div>`

})

}

loadProducts()


function searchProducts(q,cat){

q=q.toLowerCase()

let list=cat=="fashion"?fashionProducts:decorProducts
let grid=cat=="fashion"?fashionGrid:decorGrid

grid.innerHTML=""

list.filter(p=>p.name.toLowerCase().includes(q))

.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<img src="${p.img}">

<div class="card-content">

<h3>${p.name}</h3>

<p class="price">₹${p.price}</p>

<button onclick='addToCart("${p.name}",${p.price})'>Add</button>

</div>

</div>`

})

}


function getCart(){
return JSON.parse(localStorage.getItem("kpCart"))||[]
}

function saveCart(c){
localStorage.setItem("kpCart",JSON.stringify(c))
updateCart()
}

function addToCart(name,price){

let cart=getCart()

let item=cart.find(i=>i.name===name)

if(item) item.qty++
else cart.push({name,price,qty:1})

saveCart(cart)

toggleCart()

}

function updateCart(){

let cart=getCart()

let items=document.getElementById("cartItems")

items.innerHTML=""

let total=0
let count=0

cart.forEach((i,index)=>{

total+=i.price*i.qty
count+=i.qty

items.innerHTML+=`

<div class="cart-item">

<p>${i.name}</p>

<p>${i.qty} x ₹${i.price}</p>

<button onclick="removeItem(${index})">Remove</button>

</div>`

})

cartTotal.innerText="Total: ₹"+total
cartCount.innerText=count

}

function removeItem(i){

let cart=getCart()

cart.splice(i,1)

saveCart(cart)

}


function toggleCart(){

cartBox.classList.toggle("active")
overlay.classList.toggle("active")

}

function closeCart(){

cartBox.classList.remove("active")
overlay.classList.remove("active")

}

document.addEventListener("keydown",e=>{

if(e.key==="Escape") closeCart()

})

updateCart()

</script>

</body>
</html>
