<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAYAPALAT | Makeover Allover</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#F8F6F2;
--text:#111;
--gold:#C6A75E;
--heading:'Playfair Display',serif;
--body:'Inter',sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
background:var(--bg);
font-family:var(--body);
color:var(--text);
}

/* NAVBAR */

header{
position:fixed;
top:0;
width:100%;
background:rgba(248,246,242,.95);
backdrop-filter:blur(10px);
padding:15px 5%;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
}

.logo{
font-family:var(--heading);
font-size:26px;
letter-spacing:4px;
}

nav a{
margin:0 15px;
font-size:13px;
letter-spacing:2px;
text-transform:uppercase;
cursor:pointer;
}

nav a:hover{color:var(--gold)}

.menu-btn{
display:none;
font-size:24px;
cursor:pointer;
}

/* HERO */

.hero{
height:100vh;
background:url("https://images.unsplash.com/photo-1600607686527-6fb886090705?auto=format&fit=crop&w=2000&q=80") center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(248,246,242,.4);
}

.hero-content{
position:relative;
z-index:2;
}

.hero h1{
font-family:var(--heading);
font-size:70px;
letter-spacing:6px;
}

.hero p{
font-size:18px;
margin-top:10px;
}

.btn{
padding:12px 30px;
border:1px solid black;
background:none;
margin:15px;
cursor:pointer;
letter-spacing:2px;
}

.btn:hover{
border-color:var(--gold);
color:var(--gold);
}

/* SEARCH */

.search-bar{
max-width:600px;
margin:40px auto;
display:flex;
}

.search-bar input{
flex:1;
padding:12px;
border:1px solid #ddd;
}

/* PRODUCTS */

.section{
padding:120px 5%;
max-width:1300px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
margin-top:40px;
}

.card{
background:white;
box-shadow:0 10px 25px rgba(0,0,0,.08);
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:320px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
color:var(--gold);
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:flex;
justify-content:center;
align-items:center;
visibility:hidden;
opacity:0;
transition:.3s;
}

.modal.active{
visibility:visible;
opacity:1;
}

.modal-box{
background:white;
display:flex;
gap:40px;
max-width:900px;
width:90%;
padding:30px;
}

.modal img{
width:50%;
object-fit:cover;
}

.option button{
padding:6px 10px;
margin:5px;
border:1px solid #ddd;
background:white;
cursor:pointer;
}

.option button.active{
background:black;
color:white;
}

/* CART */

.cart{
position:fixed;
right:-350px;
top:0;
width:320px;
height:100%;
background:white;
padding:20px;
transition:.3s;
overflow:auto;
}

.cart.active{right:0}

.cart-item{
border-bottom:1px solid #eee;
padding:10px 0;
}

/* MOBILE */

@media(max-width:768px){

.hero h1{font-size:40px}

nav{
display:none;
position:absolute;
top:60px;
left:0;
width:100%;
background:white;
flex-direction:column;
padding:20px;
}

nav.active{display:flex}

.menu-btn{display:block}

.modal-box{
flex-direction:column;
}

.modal img{
width:100%;
}

}

</style>
</head>

<body>

<header>

<div class="logo">KAYAPALAT</div>

<nav id="navMenu">
<a onclick="showAll()">Shop</a>
<a onclick="filterCategory('fashion')">Fashion</a>
<a onclick="filterCategory('decor')">Decor</a>
<a onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</a>
</nav>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

</header>

<section class="hero">
<div class="hero-content">
<h1>KAYAPALAT</h1>
<p>Makeover Allover</p>
<button class="btn" onclick="scrollShop()">Shop Collection</button>
</div>
</section>

<div class="search-bar">
<input type="text" placeholder="Search products..." onkeyup="searchProducts(this.value)">
</div>

<section class="section" id="shop">

<div class="grid" id="productGrid"></div>

</section>

<!-- PRODUCT MODAL -->

<div class="modal" id="productModal">

<div class="modal-box">

<img id="pImg">

<div>

<h2 id="pName"></h2>
<h3 class="price" id="pPrice"></h3>

<div class="option">
<p>Size</p>
<button class="size active">M</button>
<button class="size">L</button>
<button class="size">XL</button>
</div>

<div class="option">
<p>Color</p>
<button class="color active">Black</button>
<button class="color">White</button>
</div>

<button class="btn" onclick="addToCart()">Add To Cart</button>

</div>

</div>

</div>

<!-- CART -->

<div class="cart" id="cartBox">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3 id="cartTotal"></h3>
</div>

<script>

/* PRODUCTS DATABASE */

const products=[
{name:"Classic Dress",price:12000,img:"https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=800",cat:"fashion"},
{name:"Silk Kurta",price:9500,img:"https://images.unsplash.com/photo-1520975922323-7b73b6b0b5d5?w=800",cat:"fashion"},
{name:"Minimal Vase",price:8400,img:"https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?w=800",cat:"decor"},
{name:"Stone Sculpture",price:14000,img:"https://images.unsplash.com/photo-1616627451515-cbc80e5ece35?w=800",cat:"decor"}
]

const grid=document.getElementById("productGrid")

function loadProducts(list){

grid.innerHTML=""

list.forEach(p=>{

grid.innerHTML+=`
<div class="card" onclick="openProduct('${p.name}',${p.price},'${p.img}')">
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<p class="price">₹${p.price}</p>
</div>
</div>`

})

}

loadProducts(products)

/* SEARCH */

function searchProducts(q){
q=q.toLowerCase()
loadProducts(products.filter(p=>p.name.toLowerCase().includes(q)))
}

/* FILTER */

function filterCategory(cat){
loadProducts(products.filter(p=>p.cat===cat))
}

function showAll(){
loadProducts(products)
}

/* MODAL */

let currentProduct=null

function openProduct(name,price,img){

currentProduct={name,price,img}

document.getElementById("pName").innerText=name
document.getElementById("pPrice").innerText="₹"+price
document.getElementById("pImg").src=img

document.getElementById("productModal").classList.add("active")

}

document.getElementById("productModal").onclick=e=>{
if(e.target.id==="productModal")
document.getElementById("productModal").classList.remove("active")
}

/* CART */

function getCart(){
return JSON.parse(localStorage.getItem("kpCart"))||[]
}

function saveCart(c){
localStorage.setItem("kpCart",JSON.stringify(c))
updateCart()
}

function addToCart(){

let cart=getCart()

let existing=cart.find(i=>i.name===currentProduct.name)

if(existing) existing.qty++
else cart.push({...currentProduct,qty:1})

saveCart(cart)

toggleCart()

}

/* UPDATE CART */

function updateCart(){

let cart=getCart()

let items=document.getElementById("cartItems")

items.innerHTML=""

let total=0
let count=0

cart.forEach((i,index)=>{

total+=i.price*i.qty
count+=i.qty

items.innerHTML+=`
<div class="cart-item">
<p>${i.name}</p>
<p>${i.qty} x ₹${i.price}</p>
<button onclick="removeItem(${index})">Remove</button>
</div>`

})

document.getElementById("cartTotal").innerText="Total: ₹"+total
document.getElementById("cartCount").innerText=count

}

function removeItem(i){
let cart=getCart()
cart.splice(i,1)
saveCart(cart)
}

/* UI */

function toggleCart(){
document.getElementById("cartBox").classList.toggle("active")
}

function toggleMenu(){
document.getElementById("navMenu").classList.toggle("active")
}

function scrollShop(){
document.getElementById("shop").scrollIntoView({behavior:"smooth"})
}

updateCart()

</script>

</body>
</html>
