<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>KAYAPALAT</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:#F8F6F2;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 6%;
background:white;
border-bottom:1px solid #eee;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-family:Playfair Display;
font-size:26px;
letter-spacing:4px;
}

nav a{
margin:0 14px;
cursor:pointer;
font-size:14px;
text-transform:uppercase;
}

.hero{
height:85vh;
background:url("https://images.unsplash.com/photo-1600607686527-6fb886090705?w=2000") center/cover;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
text-align:center;
}

.hero h1{
font-size:60px;
letter-spacing:6px;
font-family:Playfair Display;
}

.page{
display:none;
padding:60px 6%;
max-width:1300px;
margin:auto;
}

.page.active{
display:block;
}

.page-title{
font-family:Playfair Display;
font-size:34px;
margin-bottom:30px;
}

.search input{
width:100%;
padding:12px;
border:1px solid #ddd;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
box-shadow:0 10px 25px rgba(0,0,0,.08);
overflow:hidden;
cursor:pointer;
position:relative;
}

.card img{
width:100%;
height:280px;
object-fit:cover;
transition:.4s;
}

.card:hover img{
transform:scale(1.1);
}

.card-content{
padding:15px;
}

.price{
color:#C6A75E;
}

.wishlist{
position:absolute;
top:10px;
right:10px;
font-size:20px;
cursor:pointer;
}

.cart{
position:fixed;
right:-340px;
top:0;
width:320px;
height:100%;
background:white;
box-shadow:-10px 0 20px rgba(0,0,0,.2);
padding:20px;
transition:.3s;
overflow:auto;
z-index:1001;
}

.cart.active{
right:0;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.3);
opacity:0;
pointer-events:none;
transition:.3s;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
width:90%;
max-width:500px;
display:none;
z-index:1002;
}

.popup img{
width:100%;
}

.popup.active{
display:block;
}

</style>

</head>

<body>

<header>

<div class="logo">KAYAPALAT</div>

<nav>

<a onclick="openPage('home')">Home</a>
<a onclick="openPage('fashion')">Fashion</a>
<a onclick="openPage('decor')">Decor</a>
<a onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</a>

</nav>

</header>


<div class="overlay" id="overlay" onclick="closeAll()"></div>


<div id="home" class="page active">

<section class="hero">

<h1>KAYAPALAT</h1>
<p>Makeover Allover</p>

<button onclick="openPage('fashion')">Shop Fashion</button>

</section>

</div>


<div id="fashion" class="page">

<h2 class="page-title">Fashion</h2>

<div class="search">
<input type="text" placeholder="Search fashion..." onkeyup="searchProducts(this.value,'fashion')">
</div>

<div class="grid" id="fashionGrid"></div>

</div>


<div id="decor" class="page">

<h2 class="page-title">Decor</h2>

<div class="search">
<input type="text" placeholder="Search decor..." onkeyup="searchProducts(this.value,'decor')">
</div>

<div class="grid" id="decorGrid"></div>

</div>


<div class="cart" id="cartBox">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3 id="cartTotal"></h3>

</div>


<div class="popup" id="productPopup">

<img id="popupImg">

<h2 id="popupName"></h2>

<p id="popupPrice"></p>

<button id="popupCartBtn">Add to Cart</button>

</div>


<script>

function openPage(page){

closeAll()

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(page).classList.add("active")

window.scrollTo(0,0)

}


const fashionProducts=[
{name:"Classic Dress",price:12000,img:"https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=800"},
{name:"Silk Kurta",price:9500,img:"https://images.unsplash.com/photo-1520975922323-7b73b6b0b5d5?w=800"}
]

const decorProducts=[
{name:"Minimal Vase",price:8400,img:"https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?w=800"},
{name:"Stone Sculpture",price:14000,img:"https://images.unsplash.com/photo-1616627451515-cbc80e5ece35?w=800"}
]


function loadProducts(){

fashionProducts.forEach(p=>{
fashionGrid.innerHTML+=cardHTML(p)
})

decorProducts.forEach(p=>{
decorGrid.innerHTML+=cardHTML(p)
})

}

function cardHTML(p){

return `

<div class="card">

<div class="wishlist" onclick="toggleWish(event)">♡</div>

<img src="${p.img}" onclick='openPopup("${p.name}",${p.price},"${p.img}")'>

<div class="card-content">

<h3>${p.name}</h3>

<p class="price">₹${p.price}</p>

<button onclick='addToCart("${p.name}",${p.price})'>Add</button>

</div>

</div>

`

}

loadProducts()


function toggleWish(e){

e.target.innerText = e.target.innerText=="♡" ? "♥" : "♡"

}


function openPopup(name,price,img){

overlay.classList.add("active")

productPopup.classList.add("active")

popupImg.src=img
popupName.innerText=name
popupPrice.innerText="₹"+price

popupCartBtn.onclick=function(){
addToCart(name,price)
}

}


function closeAll(){

cartBox.classList.remove("active")

productPopup.classList.remove("active")

overlay.classList.remove("active")

}


function toggleCart(){

overlay.classList.toggle("active")

cartBox.classList.toggle("active")

}


function getCart(){
return JSON.parse(localStorage.getItem("kpCart"))||[]
}

function saveCart(c){
localStorage.setItem("kpCart",JSON.stringify(c))
updateCart()
}

function addToCart(name,price){

let cart=getCart()

let item=cart.find(i=>i.name===name)

if(item) item.qty++
else cart.push({name,price,qty:1})

saveCart(cart)

}


function updateCart(){

let cart=getCart()

cartItems.innerHTML=""

let total=0
let count=0

cart.forEach((i,index)=>{

total+=i.price*i.qty
count+=i.qty

cartItems.innerHTML+=`

<div>

<p>${i.name}</p>

<p>${i.qty} x ₹${i.price}</p>

<button onclick="removeItem(${index})">Remove</button>

</div>

`

})

cartTotal.innerText="Total ₹"+total
cartCount.innerText=count

}

function removeItem(i){

let cart=getCart()

cart.splice(i,1)

saveCart(cart)

}

updateCart()

document.addEventListener("keydown",e=>{

if(e.key==="Escape") closeAll()

})

</script>

</body>
</html>
